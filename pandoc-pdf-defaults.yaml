# Pandoc defaults file for compiling a publication-ready PDF of the Independent Impact Protocol.
# Produces a formal whitepaper with a title page, table of contents, and numbered sections.
# Run from the repository root:
#   pandoc --defaults pandoc-pdf-defaults.yaml -o protocol.pdf
#
# Requirements:
#   - Pandoc  (https://pandoc.org/)
#   - A LaTeX distribution such as TeX Live or MiKTeX  (https://www.latex-project.org/get/)

input-files:
  #- 00-Protocol.md
  - 01-a-Introduction.md
  - 02-a-Glossary.md
  - 03-a-OverviewOfConcepts.md
  - 04-a-Principles.md
  - 05-a-Standards.md
  - 06-a-Agents.md
  - 07-a-Activities.md
  - 08-a-Indicators.md
  - 09-a-Methodologies.md
  - 10-a-Instruments.md
  - 11-a-Bounties.md
  - 12-a-AntiGamingMechanisms.md
  #- 13-a-Miscellaneous.md
  #- 14-a-TechnicalImplementation.md
  #- 15-Bibliography.md

standalone: true

# Table of contents
table-of-contents: true
toc-depth: 3

# Numbered sections
number-sections: true

# Let each chapter start on a new page
include-in-header:
  - latex-header.tex

# Title-page metadata
metadata:
  title: "Independent Impact Protocol"
  subtitle: "The protocol governing the Independent Impact Platform"
  #author: "Independent Impact"
  date: "April 2026"
  lang: "en"

# PDF / LaTeX variables
variables:
  papersize: a4
  fontsize: 11pt
  geometry: "margin=2.5cm"
  colorlinks: true
  linkcolor: "NavyBlue"
  urlcolor: "NavyBlue"
  toccolor: "black"
